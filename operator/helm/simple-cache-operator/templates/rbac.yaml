{{- if .Values.rbac.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "simple-cache-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "simple-cache-operator.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "simple-cache-operator.fullname" . }}
  labels:
    {{- include "simple-cache-operator.labels" . | nindent 4 }}
rules:
- apiGroups: ["cache.shenle.lu"]
  resources: ["cacheclusters"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["cache.shenle.lu"]
  resources: ["cacheclusters/status"]
  verbs: ["get", "update", "patch"]
- apiGroups: ["cache.shenle.lu"]
  resources: ["cacheclusters/finalizers"]
  verbs: ["update"]
- apiGroups: ["apps"]
  resources: ["statefulsets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["monitoring.coreos.com"]
  resources: ["servicemonitors"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
# Scoped Role for Secrets access — only within the release namespace.
# This avoids granting the operator cluster-wide Secret read access.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "simple-cache-operator.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "simple-cache-operator.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "simple-cache-operator.fullname" . }}
  labels:
    {{- include "simple-cache-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "simple-cache-operator.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "simple-cache-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "simple-cache-operator.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "simple-cache-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "simple-cache-operator.fullname" . }}-secrets
subjects:
- kind: ServiceAccount
  name: {{ include "simple-cache-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
