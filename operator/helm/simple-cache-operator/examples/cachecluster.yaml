apiVersion: cache.shenle.lu/v1
kind: CacheCluster
metadata:
  name: my-cache
spec:
  replicas: 3
  image: registry.shenle.lu/ishenle/simple-cache:latest
  imagePullPolicy: IfNotPresent
  cache:
    maxKeys: 100000
    maxValueSize: 0
    evictionPolicy: lru
    maxQPS: 0
  raft:
    heartbeatMs: 200
    electionMs: 5000
    snapshotEnabled: true
    snapshotThreshold: 1024
  persistence:
    dumpOnShutdown: true
    loadOnStartup: false
    dumpFormat: binary
    dataDir: /data
  storage:
    size: 10Gi
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
