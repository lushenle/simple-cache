# 运行模式:
# - single: 单节点模式，支持 Dump/Load 恢复
# - distributed: 分布式模式，恢复依赖 Raft snapshot + WAL replay
mode: single

# 节点标识
node_id: node-1

# 服务监听地址
grpc_addr: ":5051"
http_addr: ":8080"
raft_http_addr: ":9090"
metrics_addr: ":2112"

# distributed 模式下的 Raft 节点列表，格式必须为 http(s)://host:port
peers: []

# Raft 定时参数（distributed 模式生效）
heartbeat_ms: 200
election_ms: 1200

# 配置热重载（当前仅部分运行时行为会读取最新配置）
hot_reload: false

# single 模式下的缓存持久化
load_on_startup: true
dump_on_shutdown: true
dump_format: binary
data_dir: data

# 管理面与写接口鉴权
auth_token: ""

# gRPC TLS
enable_tls: false
tls_cert_file: ""
tls_key_file: ""

# HTTP CORS 白名单；为空表示不放开跨域
allowed_origins: []

# Raft snapshot / log compaction（distributed 模式生效）
snapshot_enabled: true
snapshot_threshold: 1024

# Leader discovery: node_id → gRPC address mapping（distributed 模式生效）
# peer_addresses:
#   n1: ":5051"
#   n2: ":5052"
#   n3: ":5053"

# 缓存容量控制
max_keys: 0 # 最大 key 数，0 = 不限
max_value_size: 0 # 单 value 最大字节数，0 = 不限
max_qps: 0 # 每客户端每秒请求数限制，0 = 不限
eviction_policy: none # 淘汰策略："none"（拒绝写入）或 "lru"（淘汰最近最少使用）
